# ============================================================================
# AnonSurf GUI — Bridge Tor (bridges.conf)
# ============================================================================
#
# ISTRUZIONI:
#   - Inserisci una bridge line per riga
#   - Righe che iniziano con # sono commenti e vengono ignorate
#   - I bridge vengono provati IN SEQUENZA: il primo che funziona viene usato
#   - Aggiornali se smettono di funzionare
#
# COME OTTENERE I BRIDGE:
#   • Web:   https://bridges.torproject.org
#   • Email: bridges@torproject.org  (oggetto: get transport obfs4)
#
# TRASPORTI SUPPORTATI:
#   obfs4      — offuscamento traffico (più comune)
#   snowflake  — imita WebRTC (ottimo contro DPI)
#   meek-azure — usa CDN Microsoft (difficile da bloccare)
#   webtunnel  — imita HTTPS standard
#
# Per specificare il trasporto, aggiungi una riga:
#   transport:obfs4
# prima delle bridge lines corrispondenti.
# Se non specificato, viene usato obfs4 come default.
#
# ESEMPIO:
#   transport:obfs4
#   obfs4 1.2.3.4:443 FINGERPRINT cert=XXXX iat-mode=0
#   obfs4 5.6.7.8:9001 FINGERPRINT cert=YYYY iat-mode=0
#
#   transport:snowflake
#   snowflake 192.0.2.3:80 2B280B23E1107BB62ABFC40DDCC8824814F80A72 fingerprint=... url=... front=...
# ============================================================================

